services:
  config:
    image: "python:3.14-slim"
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-tiny
    networks:
      - traefik_proxy
    user: "1000:1000"
    command:
      - python
      - /scripts/generate_qbittorrent_config.py
    volumes:
      - "./qbittorrent.conf:/source/qBittorrent.conf:ro"
      - "./generate_qbittorrent_config.py:/scripts/generate_qbittorrent_config.py:ro"
      - "qbittorrent.etc:/target"
    restart: "no"

  qbittorrent:
    image: "11notes/qbittorrent:5"
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-medium
    depends_on:
      config:
        condition: service_completed_successfully
    cpu_shares: 256
    environment:
      TZ: "Europe/Zurich"
      QBITTORRENT_USER_AGENT: "11notes/qbittorrent"
    volumes:
      - "qbittorrent.etc:/qbittorrent/etc"
      - "qbittorrent.var:/qbittorrent/var"
      - "/scratch/qbittorrent:/downloads"
    ports:
      - "6881:6881/tcp"
      - "6881:6881/udp"
      - "9000:9000"
    networks:
      - traefik_proxy
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    restart: unless-stopped
    labels:
      - "checkmk_monitor=true"
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.${DOCKER_DOMAIN}`)"
      - "traefik.http.routers.qbittorrent.entrypoints=https"
      - "traefik.http.routers.qbittorrent.tls=true"
      - "traefik.http.routers.qbittorrent.middlewares=authelia@docker,secured@file"
      - "traefik.http.routers.qbittorrent.service=qbittorrent"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"


volumes:
  qbittorrent.etc:
  qbittorrent.var:

networks:
  traefik_proxy:
    external: true
